services:
  voice-assistant:
    image: ghcr.io/moimart/speaker-hass:latest
    container_name: speaker-hass
    restart: unless-stopped

    # Pass through all sound devices (Anker PowerConf S330)
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio

    ports:
      - "8080:8080"    # Web UI
      - "10700:10700"  # Wyoming satellite
      - "6600:6600"    # MPD (media_player)

    volumes:
      - ./models:/models:ro
      - ./config:/config

    environment:
      # Wyoming satellite
      - SATELLITE_PORT=10700
      - SATELLITE_NAME=Speaker HASS

      # ALSA devices — find yours with: arecord -l / aplay -l
      - MIC_DEVICE=plughw:CARD=S330,DEV=0
      - SND_DEVICE=plughw:CARD=S330,DEV=0

      # Wake word (built-in: okay_nabu, hey_jarvis, hey_mycroft, alexa)
      # For custom models, set WAKE_WORD_MODEL to a config file path
      - WAKE_WORD_NAME=okay_nabu

      # Web UI
      - WEB_PORT=8080

      # Sound effects
      - SOUND_ENABLED=true
