<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Speaker HASS</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">Speaker</h1>
            <p class="subtitle">Home Assistant Voice</p>
        </header>

        <main>
            <div class="orb-container">
                <div class="orb" id="orb">
                    <div class="orb-inner"></div>
                    <div class="orb-ring"></div>
                    <div class="orb-ring ring-2"></div>
                </div>
            </div>

            <div class="status-section">
                <p class="state-label" id="stateLabel">Ready</p>
                <p class="state-detail" id="stateDetail">Waiting for wake word</p>
            </div>

            <div class="transcript-section" id="transcriptSection">
                <div class="transcript-current" id="transcriptCurrent"></div>
            </div>

            <div class="history-section" id="historySection">
                <p class="history-title">Recent</p>
                <ul class="history-list" id="historyList"></ul>
            </div>
        </main>

        <footer>
            <div class="connection-status" id="connectionStatus">
                <span class="connection-dot"></span>
                <span class="connection-text">Connecting</span>
            </div>
            <div class="footer-right">
                <button class="mic-mute-btn" id="micMuteBtn" aria-label="Toggle microphone">
                    <svg class="mic-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                    <svg class="mic-off-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path>
                        <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .67-.08 1.32-.22 1.94"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <div class="volume-control" id="volumeControl">
                    <button class="volume-btn" id="volumeBtn" aria-label="Volume">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path class="vol-wave vol-wave-1" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                            <path class="vol-wave vol-wave-2" d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                        </svg>
                    </button>
                    <div class="volume-slider-wrap" id="volumeSliderWrap">
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50">
                    </div>
                </div>
                <a href="/settings" class="settings-link">Settings</a>
            </div>
        </footer>
    </div>

    <script src="/static/bg.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
